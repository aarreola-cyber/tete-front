<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff;display:flex;flex-direction:column;height:100vh}

#chat{flex:1;overflow:auto;padding:15px;display:flex;flex-direction:column;gap:10px}

.bubble{max-width:75%;padding:12px;border-radius:18px;animation:fade .2s}
.user{align-self:flex-end;background:#2563eb}
.bot{align-self:flex-start;background:#222}

@keyframes fade{from{opacity:0}to{opacity:1}}

#bar{display:flex;padding:10px;background:#111}
#input{flex:1;padding:10px;border:none;border-radius:20px;background:#222;color:#fff}
#btn{margin-left:10px;padding:10px;border:none;border-radius:20px;background:#2563eb}

.dots{display:flex;gap:4px}
.dot{width:6px;height:6px;background:#aaa;border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}
</style>
</head>

<body>

<div id="chat"></div>

<div id="bar">
<input id="input">
<button id="btn">→</button>
</div>

<script>
let userId = localStorage.getItem("id") || crypto.randomUUID();
localStorage.setItem("id",userId);

const chat=document.getElementById("chat");
const input=document.getElementById("input");

function bubble(t,c){
 const d=document.createElement("div");
 d.className="bubble "+c;
 d.innerText=t;
 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

function typing(){
 const d=document.createElement("div");
 d.className="bubble bot";
 d.innerHTML='<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
 chat.appendChild(d);
 return d;
}

function tiempo(t){
 let x=300+t.length*20;
 if(Math.random()<.2)x+=300;
 return Math.min(x,2000);
}

async function enviar(){
 const txt=input.value.trim();
 if(!txt)return;

 bubble(txt,"user");
 input.value="";

 const t=typing();

 let data=null;

 try{
  const res=await fetch("/chat",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({mensaje:txt,userId})
  });
  data=await res.json();
 }catch{}

 t.remove();

 if(data&&data.text){
   setTimeout(()=>bubble(data.text,"bot"),tiempo(data.text));
 }else{
   bubble("…","bot");
 }
}

input.addEventListener("keydown",e=>{
 if(e.key==="Enter")enviar();
});
</script>

</body>
</html>
