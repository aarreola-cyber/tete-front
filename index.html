<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  background:#0b0b0f;
  font-family:system-ui;
  color:#fff;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:18px;
  font-size:15px;
  line-height:1.4;
}

.user{
  align-self:flex-end;
  background:#4a6cff;
}

.bot{
  align-self:flex-start;
  background:#1a1a22;
}

.typing{
  font-size:13px;
  opacity:0.6;
  margin-left:10px;
}

#inputArea{
  display:flex;
  padding:10px;
  background:#111;
  border-top:1px solid #222;
}

#input{
  flex:1;
  background:#1a1a22;
  border:none;
  color:#fff;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

#input:focus{outline:none;}

#send{
  margin-left:8px;
  background:#4a6cff;
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="input" rows="1" placeholder="Escríbele..."></textarea>
  <button id="send">➤</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");

// ID único simple
const userId = localStorage.getItem("tt_user") || Math.random().toString(36).substring(7);
localStorage.setItem("tt_user", userId);

function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(){
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typing";
  div.innerText = "escribiendo...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById("typing");
  if(t) t.remove();
}

async function enviar(){
  const text = input.value.trim();
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  showTyping();

  try{
    const res = await fetch("https://tete-api-production.up.railway.app/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        mensaje: text,
        userId: userId
      })
    });

    const data = await res.json();

    // delay natural
    setTimeout(()=>{
      removeTyping();
      addMsg(data.text, "bot");
    }, 800 + Math.random()*1200);

  }catch(e){
    removeTyping();
    addMsg("…sigo aquí", "bot");
  }
}

// botón
sendBtn.onclick = enviar;

// 🔹 ENTER ENVÍA
input.addEventListener("keydown", function(e){
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    enviar();
  }
});
</script>

</body>
</html>
