<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
:root{
--bg1:#0b0b12;
--bg2:#000;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);
--blue:#2563eb;
}

*{box-sizing:border-box}

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(to bottom,var(--bg1),var(--bg2));
color:#fff;
}

/* HEADER */
#header{
position:sticky;
top:0;
display:flex;
align-items:center;
padding:12px;
backdrop-filter: blur(15px);
background:rgba(10,10,20,0.6);
border-bottom:1px solid var(--border);
z-index:10;
}

#header img{
width:42px;height:42px;border-radius:50%;
margin-right:10px;
animation:breathe 3s infinite ease-in-out;
}

@keyframes breathe{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:10px;
scroll-behavior:smooth;
}

/* BURBUJAS */
.bubble{
max-width:75%;
padding:12px 14px;
border-radius:20px;
font-size:15px;
line-height:1.4;
backdrop-filter:blur(10px);
animation:fadeIn .2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px)}
to{opacity:1;transform:translateY(0)}
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
box-shadow:0 4px 15px rgba(37,99,235,0.4);
border-bottom-right-radius:6px;
}

.bot{
align-self:flex-start;
background:var(--glass);
border:1px solid var(--border);
border-bottom-left-radius:6px;
}

/* INPUT BAR */
#bar{
position:sticky;
bottom:0;
display:flex;
padding:10px;
gap:10px;
backdrop-filter:blur(15px);
background:rgba(10,10,20,0.7);
border-top:1px solid var(--border);
}

#input{
flex:1;
padding:12px 16px;
border-radius:25px;
border:none;
background:rgba(255,255,255,0.08);
color:#fff;
font-size:15px;
outline:none;
}

#btn{
width:44px;
height:44px;
border-radius:50%;
border:none;
background:var(--blue);
color:#fff;
font-size:18px;
cursor:pointer;
transition:.15s;
}

#btn:active{
transform:scale(.9);
}

/* STATUS */
#status{
font-size:12px;
color:#aaa;
}

/* TYPING */
.dots{
display:flex;
gap:4px;
}

.dot{
width:6px;height:6px;
background:#aaa;
border-radius:50%;
animation:blink 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}
</style>
</head>

<body>

<div id="header">
<img src="https://raw.githubusercontent.com/aarreola-cyber/tete-front/main/650663840_122235082904132407_4121639713471677136_n.png">
<div>
<div style="font-size:15px;">Tete</div>
<div id="status">en línea</div>
</div>
</div>

<div id="chat"></div>

<div id="bar">
<input id="input" placeholder="Escríbele..." />
<button id="btn">➤</button>
</div>

<script>
let userId = localStorage.getItem("tete_user") || ("u_"+Math.random());
localStorage.setItem("tete_user", userId);

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const btn = document.getElementById("btn");
const status = document.getElementById("status");

let ultimoUsuario = Date.now();

/* TIEMPO HUMANO */
function tiempoHumano(texto){
 let t = 300 + texto.length * 22;
 t *= 0.85 + Math.random()*0.3;
 if(texto.includes("...")) t+=300;
 return Math.min(t,2200);
}

/* BURBUJA */
function bubble(texto,tipo){
 const b=document.createElement("div");
 b.className="bubble "+tipo;
 b.innerText=texto;
 chat.appendChild(b);
 chat.scrollTop=chat.scrollHeight;
}

/* TYPING */
function typing(){
 const b=document.createElement("div");
 b.className="bubble bot";

 const d=document.createElement("div");
 d.className="dots";

 for(let i=0;i<3;i++){
  let dot=document.createElement("div");
  dot.className="dot";
  d.appendChild(dot);
 }

 b.appendChild(d);
 chat.appendChild(b);
 chat.scrollTop=chat.scrollHeight;

 return b;
}

/* ENVIAR */
async function enviar(){
 const txt=input.value.trim();
 if(!txt) return;

 bubble(txt,"user");
 input.value="";
 ultimoUsuario=Date.now();

 await new Promise(r=>setTimeout(r,200+Math.random()*300));

 status.innerText="escribiendo...";
 const t=typing();

 let data=null;

 try{
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),15000);

  const res=await fetch("https://tete-api-production.up.railway.app/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mensaje:txt,userId}),
    signal:controller.signal
  });

  clearTimeout(timeout);
  data=await res.json();

 }catch(e){console.log(e);}

 t.remove();

 if(data && data.text){
  const delay = tiempoHumano(data.text);

  setTimeout(()=>{
   bubble(data.text,"bot");
   status.innerText="en línea";
  }, delay);

 }else{
  bubble("… dame un segundo","bot");
  status.innerText="en línea";
 }
}

input.addEventListener("keydown",e=>{
 if(e.key==="Enter"){e.preventDefault();enviar();}
});
btn.onclick=enviar;

/* PRESENCIA */
setInterval(async ()=>{
 const ahora=Date.now();

 if(ahora-ultimoUsuario>60000){

  status.innerText="escribiendo...";
  const t=typing();

  let data=null;

  try{
   const res=await fetch("https://tete-api-production.up.railway.app/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      mensaje:"INICIAR_CONVERSACION",
      userId
    })
   });

   data=await res.json();
  }catch{}

  t.remove();

  if(data && data.text){
   bubble(data.text,"bot");
  }

  status.innerText="en línea";
  ultimoUsuario=Date.now();
 }
},20000);
</script>

</body>
</html>
