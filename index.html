<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;height:100vh;display:flex;flex-direction:column}

#header{display:flex;align-items:center;padding:10px;background:#111}
#header img{width:40px;height:40px;border-radius:50%;margin-right:10px}

#chat{flex:1;overflow:auto;padding:15px;display:flex;flex-direction:column;gap:10px}

.bubble{max-width:75%;padding:12px;border-radius:18px;opacity:0;transform:translateY(5px);transition:.2s}
.user{align-self:flex-end;background:#2563eb}
.bot{align-self:flex-start;background:#222}

#bar{display:flex;padding:10px;background:#111}
#input{flex:1;padding:12px;border-radius:20px;border:none;background:#222;color:#fff}
#btn{margin-left:10px;padding:12px;border-radius:20px;border:none;background:#444}

.dots{display:flex;gap:4px}
.dot{width:6px;height:6px;background:#aaa;border-radius:50%;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}
</style>
</head>

<body>

<div id="header">
<img src="https://i.imgur.com/1X6bGQX.jpg">
<div>
<div>Tete</div>
<div id="status" style="font-size:12px;color:#888">en línea</div>
</div>
</div>

<div id="chat"></div>

<div id="bar">
<input id="input" placeholder="Escríbele...">
<button id="btn">→</button>
</div>

<script>
let userId = localStorage.getItem("tete_user") || ("u_"+Math.random());
localStorage.setItem("tete_user", userId);

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const btn = document.getElementById("btn");
const status = document.getElementById("status");

let ultimoUsuario = Date.now();

input.addEventListener("keydown", e=>{
 if(e.key==="Enter"){e.preventDefault(); enviar();}
});
btn.onclick = enviar;

function bubble(text, cls){
 const b=document.createElement("div");
 b.className="bubble "+cls;
 b.innerText=text;
 chat.appendChild(b);
 setTimeout(()=>{b.style.opacity=1;b.style.transform="translateY(0)"},20);
 chat.scrollTop=chat.scrollHeight;
 return b;
}

function typing(){
 const b=document.createElement("div");
 b.className="bubble bot";
 const d=document.createElement("div"); d.className="dots";
 for(let i=0;i<3;i++){let dot=document.createElement("div");dot.className="dot";d.appendChild(dot);}
 b.appendChild(d);
 chat.appendChild(b);
 chat.scrollTop=chat.scrollHeight;
 return b;
}

async function enviar(){
 const txt=input.value.trim();
 if(!txt) return;

 bubble(txt,"user");
 input.value="";
 ultimoUsuario=Date.now();

 status.innerText="escribiendo...";
 const t=typing();

 const res=await fetch("https://tete-api-production.up.railway.app/chat",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({mensaje:txt,userId})
 });

 const data=await res.json();

 setTimeout(()=>{
  t.remove();
  bubble(data.text,"bot");
  status.innerText="en línea";
 },800);
}

// PRESENCIA
setInterval(async ()=>{
 const ahora=Date.now();

 if(ahora-ultimoUsuario>60000){

  status.innerText="escribiendo...";
  const t=typing();

  const res=await fetch("https://tete-api-production.up.railway.app/chat",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
     mensaje:"INICIAR_CONVERSACION",
     userId
   })
  });

  const data=await res.json();

  setTimeout(()=>{
    t.remove();
    bubble(data.text,"bot");
    status.innerText="en línea";
  },1200);

  ultimoUsuario=Date.now();
 }
},15000);
</script>

</body>
</html>
