<!DOCTYPE html>
<html>
<body style="margin:0;background:black;color:white;font-family:sans-serif;display:flex;flex-direction:column;height:100vh;">

<div id="chat" style="flex:1;overflow:auto;padding:20px;"></div>

<div style="display:flex;padding:10px;background:#111;">
  <input id="input" placeholder="escríbele..."
    style="flex:1;padding:12px;font-size:16px;background:#222;color:white;border:none;outline:none;">
  <button onclick="enviar()"
    style="padding:12px 20px;background:#444;color:white;border:none;cursor:pointer;">
    →
  </button>
</div>

<script>
let userId = localStorage.getItem("tete_user");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("tete_user", userId);
}

document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") enviar();
});

let ultimoMensaje = Date.now();

// 🔥 reenganche pasivo (sin molestar)
setInterval(() => {
  const ahora = Date.now();
  if (ahora - ultimoMensaje > 60000) {
    agregar("tete", "… te fuiste tan rápido?");
    ultimoMensaje = ahora;
  }
}, 20000);

async function enviar() {
  const input = document.getElementById("input");
  const texto = input.value;
  if (!texto) return;

  agregar("tú", texto);
  input.value = "";

  ultimoMensaje = Date.now();

  const typing = agregar("tete", "escribiendo...");

  try {
    const res = await fetch("https://tete-api-production.up.railway.app/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        mensaje: texto,
        userId: userId
      })
    });

    const data = await res.json();

    setTimeout(() => {
      typing.innerText = "tete: " + data.text;
    }, 600 + Math.random() * 1000);

  } catch (e) {
    typing.innerText = "tete: … te perdiste";
  }
}

function agregar(quien, texto) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");

  div.style.marginBottom = "12px";
  div.style.opacity = "0";
  div.style.transition = "0.25s";
  div.style.lineHeight = "1.4";

  div.innerText = quien + ": " + texto;

  chat.appendChild(div);

  setTimeout(() => div.style.opacity = "1", 50);

  chat.scrollTop = chat.scrollHeight;

  return div;
}
</script>

</body>
</html>
