<!DOCTYPE html>
<html>
<body style="margin:0;background:black;color:white;font-family:sans-serif;display:flex;flex-direction:column;height:100vh;">

<div id="chat" style="flex:1;overflow:auto;padding:20px;"></div>

<div style="display:flex;padding:10px;background:#111;">
  <input id="input" placeholder="escríbele..." style="flex:1;padding:12px;font-size:16px;background:#222;color:white;border:none;">
  <button onclick="enviar()" style="padding:12px 20px;background:#444;color:white;border:none;">→</button>
</div>

<script>
// 🔥 ID persistente
let userId = localStorage.getItem("tete_user");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("tete_user", userId);
}

async function enviar() {
  const input = document.getElementById("input");
  const texto = input.value;
  if (!texto) return;

  agregar("tú", texto);
  input.value = "";

  const typing = agregar("tete", "...");

  try {
    const res = await fetch("https://tete-api-production.up.railway.app/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        mensaje: texto,
        userId: userId
      })
    });

    const data = await res.json();

    setTimeout(() => {
      typing.innerText = "tete: " + data.text;
    }, 800 + Math.random() * 800);

  } catch (e) {
    typing.innerText = "tete: … te perdiste";
  }
}

function agregar(quien, texto) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");

  div.style.marginBottom = "12px";
  div.style.opacity = "0";
  div.style.transition = "0.3s";

  div.innerText = quien + ": " + texto;

  chat.appendChild(div);

  setTimeout(() => div.style.opacity = "1", 50);

  chat.scrollTop = chat.scrollHeight;

  return div;
}
</script>

</body>
</html>
