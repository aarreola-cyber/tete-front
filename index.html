<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:sans-serif;
height:100vh;
display:flex;
flex-direction:column;
background: radial-gradient(circle at top, #1a1a2e, #000);
color:#fff;
}

/* HEADER */
#header{
display:flex;
align-items:center;
padding:12px;
backdrop-filter: blur(10px);
background: rgba(20,20,30,0.6);
border-bottom:1px solid rgba(255,255,255,0.05);
}

#header img{
width:42px;
height:42px;
border-radius:50%;
margin-right:10px;
box-shadow:0 0 15px rgba(255,255,255,0.1);
animation: breathe 3s infinite ease-in-out;
}

@keyframes breathe{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* CHAT */
#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.bubble{
max-width:75%;
padding:14px;
border-radius:18px;
opacity:0;
transform:translateY(5px);
transition:.25s;
backdrop-filter: blur(8px);
}

.user{
align-self:flex-end;
background: linear-gradient(135deg,#2563eb,#1d4ed8);
box-shadow:0 5px 20px rgba(37,99,235,0.4);
}

.bot{
align-self:flex-start;
background: rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

/* INPUT */
#bar{
display:flex;
padding:10px;
background: rgba(20,20,30,0.7);
backdrop-filter: blur(10px);
}

#input{
flex:1;
padding:14px;
border-radius:25px;
border:none;
background: rgba(255,255,255,0.08);
color:#fff;
outline:none;
}

#btn{
margin-left:10px;
padding:14px;
border-radius:50%;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
}

/* TYPING */
.dots{display:flex;gap:4px}
.dot{
width:6px;height:6px;background:#aaa;border-radius:50%;
animation:blink 1.2s infinite;
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}
</style>
</head>

<body>

<div id="header">
<img src="https://raw.githubusercontent.com/aarreola-cyber/tete-front/main/650663840_122235082904132407_4121639713471677136_n.png">
<div>
<div>Tete</div>
<div id="status" style="font-size:12px;color:#aaa">en línea</div>
</div>
</div>

<div id="chat"></div>

<div id="bar">
<input id="input" placeholder="Escríbele...">
<button id="btn">→</button>
</div>

<script>
let userId = localStorage.getItem("tete_user") || ("u_"+Math.random());
localStorage.setItem("tete_user", userId);

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const btn = document.getElementById("btn");
const status = document.getElementById("status");

let ultimoUsuario = Date.now();

/* TIEMPO HUMANO */
function tiempoHumano(texto){
  let t = 400 + texto.length * 25;
  t *= 0.8 + Math.random()*0.4;
  return Math.min(t, 2500);
}

/* BURBUJA */
function bubble(texto, tipo){
 const b=document.createElement("div");
 b.className="bubble "+tipo;
 b.innerText=texto;

 if(tipo==="bot"){
  b.style.boxShadow="0 0 20px rgba(255,255,255,0.05)";
  setTimeout(()=>b.style.boxShadow="none",500);
 }

 chat.appendChild(b);

 setTimeout(()=>{
  b.style.opacity=1;
  b.style.transform="translateY(0)";
 },20);

 chat.scrollTo({top: chat.scrollHeight, behavior:"smooth"});

 return b;
}

/* TYPING */
function typing(){
 const b=document.createElement("div");
 b.className="bubble bot";

 const d=document.createElement("div");
 d.className="dots";

 let n=2+Math.floor(Math.random()*2);

 for(let i=0;i<n;i++){
  let dot=document.createElement("div");
  dot.className="dot";
  d.appendChild(dot);
 }

 b.appendChild(d);
 chat.appendChild(b);
 chat.scrollTop=chat.scrollHeight;

 return b;
}

/* RETRY */
async function enviarRetry(txt){
 let data=null;

 try{
  const res=await fetch("https://tete-api-production.up.railway.app/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mensaje:txt,userId})
  });

  data=await res.json();
 }catch{}

 if(data && data.text){
   bubble(data.text,"bot");
 }else{
   bubble("… ahora sí me hiciste pensar de más","bot");
 }

 status.innerText="en línea";
}

/* ENVIAR */
async function enviar(){
 const txt=input.value.trim();
 if(!txt) return;

 bubble(txt,"user");
 input.value="";
 ultimoUsuario=Date.now();

 status.innerText="en línea";

 // 🔥 reacción inmediata
 const reacciones = ["mmm…","a ver…","espera…","interesante…"];
 const pre = bubble(reacciones[Math.floor(Math.random()*reacciones.length)],"bot");

 await new Promise(r=>setTimeout(r,300+Math.random()*400));

 status.innerText="escribiendo...";
 const t=typing();

 let data=null;

 try{
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),15000);

  const res=await fetch("https://tete-api-production.up.railway.app/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mensaje:txt,userId}),
    signal:controller.signal
  });

  clearTimeout(timeout);
  data=await res.json();

 }catch(e){console.log(e);}

 pre.remove();

 if(data && data.text){
   setTimeout(()=>{
     t.remove();
     bubble(data.text,"bot");
     status.innerText="en línea";
   }, tiempoHumano(data.text));
 }else{
   t.remove();

   bubble("mmm… dame un segundo más","bot");
   status.innerText="reintentando…";

   setTimeout(()=>enviarRetry(txt),1200);
 }
}

input.addEventListener("keydown",e=>{
 if(e.key==="Enter"){e.preventDefault();enviar();}
});
btn.onclick=enviar;

/* PRESENCIA */
setInterval(async ()=>{
 const ahora=Date.now();

 if(ahora-ultimoUsuario>60000){

  await new Promise(r=>setTimeout(r,500+Math.random()*1000));

  const pre = bubble("mmm…","bot");

  status.innerText="escribiendo...";
  const t=typing();

  let data=null;

  try{
   const res=await fetch("https://tete-api-production.up.railway.app/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mensaje:"INICIAR_CONVERSACION",userId})
   });

   data=await res.json();
  }catch{}

  pre.remove();

  if(data && data.text){
   setTimeout(()=>{
    t.remove();
    bubble(data.text,"bot");
    status.innerText="en línea";
   }, tiempoHumano(data.text));
  }else{
   t.remove();
   status.innerText="en línea";
  }

  ultimoUsuario=Date.now();
 }
},15000);
</script>

</body>
</html>
