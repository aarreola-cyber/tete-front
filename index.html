<!DOCTYPE html>
<html>
<body style="margin:0;background:black;color:white;font-size:28px;display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;flex-direction:column;gap:40px;">

<div id="texto">...</div>

<button onclick="hablar()" style="padding:20px 40px;font-size:20px;">ver qué dice</button>

<script>
async function hablar() {
  try {
    const res = await fetch("https://tete-api-production.up.railway.app/mensaje", {
      method: "POST"
    });

    const data = await res.json();
    document.getElementById("texto").innerText = data.text;

  } catch (e) {
    document.getElementById("texto").innerText = "no estás listo para esto...";
  }
}
</script>

</body>
</html>
