<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="margin:0;background:black;font-family:sans-serif;display:flex;flex-direction:column;height:100vh;color:white;">

<div id="chat" style="flex:1;overflow:auto;padding:15px;display:flex;flex-direction:column;gap:10px;"></div>

<div style="display:flex;padding:10px;background:#111;border-top:1px solid #222;">
  <input id="input" placeholder="Escríbele..."
    style="flex:1;padding:12px;border-radius:20px;border:none;background:#222;color:white;font-size:16px;outline:none;">
  <button id="btn" onclick="enviar()"
    style="margin-left:10px;padding:12px 18px;border-radius:20px;border:none;background:#444;color:white;transition:0.1s;">
    →
  </button>
</div>

<script>
let userId = localStorage.getItem("tete_user");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("tete_user", userId);
}

const input = document.getElementById("input");
const btn = document.getElementById("btn");

input.focus();

// 🔥 ENTER PRO
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();

    btn.style.transform = "scale(0.92)";
    setTimeout(() => btn.style.transform = "scale(1)", 120);

    enviar();
  }
});

let ultimoMensaje = Date.now();

// 🔥 reenganche suave
setInterval(() => {
  const ahora = Date.now();
  if (ahora - ultimoMensaje > 60000) {
    agregar("tete", "… te fuiste tan rápido?");
    ultimoMensaje = ahora;
  }
}, 20000);

async function enviar() {
  const texto = input.value.trim();
  if (!texto) return;

  agregar("tú", texto);
  input.value = "";
  ultimoMensaje = Date.now();

  const typing = typingDots();

  try {
    const res = await fetch("https://tete-api-production.up.railway.app/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        mensaje: texto,
        userId: userId
      })
    });

    const data = await res.json();

    setTimeout(() => {
      typing.innerText = data.text;
    }, 600 + Math.random() * 1000);

  } catch (e) {
    typing.innerText = "… te perdiste";
  }

  input.focus();
}

// 🔥 burbujas
function agregar(quien, texto) {
  const chat = document.getElementById("chat");

  const wrapper = document.createElement("div");
  wrapper.style.display = "flex";
  wrapper.style.justifyContent = quien === "tú" ? "flex-end" : "flex-start";

  const bubble = document.createElement("div");

  bubble.style.maxWidth = "75%";
  bubble.style.padding = "12px 16px";
  bubble.style.borderRadius = "18px";
  bubble.style.lineHeight = "1.4";
  bubble.style.fontSize = "15px";
  bubble.style.opacity = "0";
  bubble.style.transform = "translateY(5px)";
  bubble.style.transition = "0.2s";

  if (quien === "tú") {
    bubble.style.background = "#2563eb";
    bubble.style.color = "white";
  } else {
    bubble.style.background = "#222";
    bubble.style.color = "#ddd";
  }

  bubble.innerText = texto;

  wrapper.appendChild(bubble);
  chat.appendChild(wrapper);

  setTimeout(() => {
    bubble.style.opacity = "1";
    bubble.style.transform = "translateY(0)";
  }, 30);

  chat.scrollTop = chat.scrollHeight;

  return bubble;
}

// 🔥 typing animado (...)
function typingDots() {
  const chat = document.getElementById("chat");

  const wrapper = document.createElement("div");
  wrapper.style.display = "flex";
  wrapper.style.justifyContent = "flex-start";

  const bubble = document.createElement("div");

  bubble.style.padding = "12px 16px";
  bubble.style.borderRadius = "18px";
  bubble.style.background = "#222";
  bubble.style.color = "#aaa";

  let dots = 0;

  const interval = setInterval(() => {
    dots = (dots + 1) % 4;
    bubble.innerText = ".".repeat(dots);
  }, 300);

  wrapper.appendChild(bubble);
  chat.appendChild(wrapper);

  chat.scrollTop = chat.scrollHeight;

  bubble.stop = () => clearInterval(interval);

  return bubble;
}
</script>

</body>
</html>
