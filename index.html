<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
--bg1:#0b0b12;
--bg2:#000;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.08);
--blue:#2563eb;
--blue2:#1d4ed8;
}

*{box-sizing:border-box}

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
font-family:-apple-system,sans-serif;
background:linear-gradient(to bottom,var(--bg1),var(--bg2));
color:#fff;
overflow:hidden;
}

/* HEADER */
#header{
position:sticky;
top:0;
display:flex;
align-items:center;
padding:12px;
backdrop-filter:blur(15px);
background:rgba(10,10,20,0.6);
border-bottom:1px solid var(--border);
}

#header img{
width:42px;
height:42px;
border-radius:50%;
margin-right:10px;
animation:breathe 3s infinite;
}

@keyframes breathe{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

#status{font-size:12px;color:#aaa}

/* CHAT */
#chat{
flex:1;
overflow:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:10px;
}

/* BUBBLES */
.bubble{
max-width:75%;
padding:12px;
border-radius:20px;
animation:fade .2s;
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,var(--blue),var(--blue2));
}

.bot{
align-self:flex-start;
background:var(--glass);
border:1px solid var(--border);
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* INPUT */
#bar{
display:flex;
padding:10px;
background:rgba(10,10,20,0.7);
backdrop-filter:blur(15px);
}

#input{
flex:1;
padding:12px;
border-radius:20px;
border:none;
background:#222;
color:#fff;
}

#btn{
margin-left:10px;
padding:12px;
border:none;
border-radius:20px;
background:var(--blue);
color:#fff;
}

/* TYPING */
.dots{display:flex;gap:4px}
.dot{
width:6px;height:6px;background:#aaa;border-radius:50%;
animation:blink 1.2s infinite;
}
@keyframes blink{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}
</style>
</head>

<body>

<div id="header">
<img src="https://raw.githubusercontent.com/aarreola-cyber/tete-front/main/650663840_122235082904132407_4121639713471677136_n.png">
<div>
<div>Tete</div>
<div id="status">en línea</div>
</div>
</div>

<div id="chat"></div>

<div id="bar">
<input id="input" placeholder="Escríbele...">
<button id="btn">→</button>
</div>

<script>
let userId = localStorage.getItem("id") || crypto.randomUUID();
localStorage.setItem("id",userId);

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const status=document.getElementById("status");

function bubble(t,c){
 const d=document.createElement("div");
 d.className="bubble "+c;
 d.innerText=t;
 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

function typing(){
 const d=document.createElement("div");
 d.className="bubble bot";
 d.innerHTML='<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
 chat.appendChild(d);
 return d;
}

function tiempo(t){
 let x=300+t.length*20;
 if(Math.random()<0.2) x+=300;
 return Math.min(x,2000);
}

async function enviar(){
 const txt=input.value.trim();
 if(!txt)return;

 bubble(txt,"user");
 input.value="";

 status.innerText="escribiendo...";
 const t=typing();

 let data=null;

 try{
  const res=await fetch("https://tete-api-production.up.railway.app/chat",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({mensaje:txt,userId})
  });

  data=await res.json();
 }catch(e){}

 t.remove();

 if(data && data.text){
   setTimeout(()=>{
     bubble(data.text,"bot");
     status.innerText="en línea";
   }, tiempo(data.text));
 }else{
   bubble("… sigo aquí","bot");
   status.innerText="en línea";
 }
}

input.addEventListener("keydown",e=>{
 if(e.key==="Enter") enviar();
});
document.getElementById("btn").onclick=enviar;
</script>

</body>
</html>
