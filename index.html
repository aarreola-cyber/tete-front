<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

 
<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* HEADER */
#header{
position:sticky;
top:0;
display:flex;
align-items:center;
padding:12px;
backdrop-filter:blur(15px);
background:rgba(10,10,20,0.6);
border-bottom:1px solid rgba(255,255,255,0.1);
}

#header img{
width:42px;height:42px;border-radius:50%;margin-right:10px;
}

#status{font-size:12px;color:#aaa}

/* CHAT */
#chat{
flex:1;
overflow:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:10px;
}

.bubble{
max-width:75%;
padding:12px;
border-radius:20px;
animation:fade .2s;
}

.user{
align-self:flex-end;
background:#2563eb;
}

.bot{
align-self:flex-start;
background:#222;
}

@keyframes fade{from{opacity:0}to{opacity:1}}

/* INPUT */
#bar{
display:flex;
padding:10px;
background:#111;
}

#input{
flex:1;
padding:12px;
border-radius:20px;
border:none;
background:#222;
color:#fff;
}

#btn{
margin-left:10px;
padding:12px;
border:none;
border-radius:20px;
background:#2563eb;
color:#fff;
}

/* TYPING */
.dots{display:flex;gap:4px}
.dot{
width:6px;height:6px;background:#aaa;border-radius:50%;
animation:blink 1.2s infinite;
}
@keyframes blink{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}
</style>
</head>

<body>

<div id="header">
<img src="https://raw.githubusercontent.com/aarreola-cyber/tete-front/main/650663840_122235082904132407_4121639713471677136_n.png">
<div>
<div>Tete</div>
<div id="status">en línea</div>
</div>
</div>

<div id="chat"></div>

<div id="bar">
<input id="input" placeholder="Escríbele...">
<button id="btn">→</button>
</div>

<script>
let userId = localStorage.getItem("id") || crypto.randomUUID();
localStorage.setItem("id",userId);

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const status=document.getElementById("status");

function bubble(t,c){
 const d=document.createElement("div");
 d.className="bubble "+c;
 d.innerText=t;
 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

function typing(){
 const d=document.createElement("div");
 d.className="bubble bot";
 d.innerHTML='<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
 chat.appendChild(d);
 return d;
}

function tiempo(t){
 let x=400+t.length*25;
 return Math.min(x,2500);
}

/* 🔥 REENGANCHE AL ABRIR */
setTimeout(()=>{
 const frases = [
  "… volviste",
  "pensé en ti",
  "mm, tardaste",
  "no te desaparezcas así"
 ];
 bubble(frases[Math.floor(Math.random()*frases.length)],"bot");
},1200);

/* 🔥 INICIATIVA (Tete habla sola) */
setInterval(()=>{
 if(Math.random() < 0.25){
   enviarSilencioso();
 }
},15000);

async function enviarSilencioso(){
 try{
  const res=await fetch("https://tete-api-production.up.railway.app/chat",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({mensaje:"...",userId})
  });

  const data=await res.json();

  if(data.text){
    bubble(data.text,"bot");
  }

 }catch{}
}

async function enviar(){
 const txt=input.value.trim();
 if(!txt)return;

 bubble(txt,"user");
 input.value="";

 status.innerText="escribiendo...";
 const t=typing();

 let data=null;

 try{
  const controller = new AbortController();
  setTimeout(()=>controller.abort(),10000);

  const res=await fetch("https://tete-api-production.up.railway.app/chat",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({mensaje:txt,userId}),
   signal:controller.signal
  });

  const text=await res.text();

  try{
    data=JSON.parse(text);
  }catch{
    data={text:"… casi te respondo"};
  }

 }catch(e){}

 t.remove();

 if(data && data.text){
   setTimeout(()=>{
     bubble(data.text,"bot");
     status.innerText="en línea";
   }, tiempo(data.text) + Math.random()*400);
 }else{
   bubble("… sigo aquí","bot");
   status.innerText="en línea";
 }
}

input.addEventListener("keydown",e=>{
 if(e.key==="Enter") enviar();
});

document.getElementById("btn").onclick=enviar;
</script>

</body>
</html>
